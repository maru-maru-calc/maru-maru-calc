    <style>
      .jp { font-family: "Noto Sans JP", "Hiragino Sans", "Yu Gothic", sans-serif; }
      .heavy { font-weight: 900; }
      .bold { font-weight: 800; }
      .label { font-size: 12px; fill: #075985; font-weight: 900; }
      .sub { font-size: 13px; fill: #0284C7; font-weight: 800; }
      .title { font-size: 30px; fill: #12334A; font-weight: 900; }
      .small { font-size: 11px; fill: #075985; font-weight: 900; }
