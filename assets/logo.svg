<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Bead Glossy Gradient -->
    <radialGradient id="beadGradient" cx="35%" cy="35%" r="50%" fx="35%" fy="35%">
      <stop offset="0%" style="stop-color:#FFF7C7;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#FDE68A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CFA83A;stop-opacity:1" />
    </radialGradient>
    
    <!-- Bubble Glossy Gradient -->
    <radialGradient id="bubbleGradient" cx="35%" cy="35%" r="50%" fx="35%" fy="35%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.9" />
      <stop offset="40%" style="stop-color:#EAFBFF;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#7DD3FC;stop-opacity:0.4" />
    </radialGradient>

    <!-- Shadow Filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" />
      <feOffset dx="1" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Group for the "●●" part -->
  <g filter="url(#shadow)">
    <!-- First "Maru" - A glossy yellow bead -->
    <circle cx="45" cy="60" r="28" fill="url(#beadGradient)" stroke="#CFA83A" stroke-width="1.5" />
    <circle cx="40" cy="52" r="8" fill="#FFFFFF" fill-opacity="0.4" /> <!-- Highlight -->

    <!-- Second "Maru" - A slightly overlapping bubble-like bead -->
    <circle cx="95" cy="60" r="28" fill="url(#bubbleGradient)" stroke="#7DD3FC" stroke-width="1.5" />
    <circle cx="90" cy="52" r="8" fill="#FFFFFF" fill-opacity="0.6" /> <!-- Highlight -->
  </g>

  <!-- Text part "calc." -->
  <text x="145" y="78" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="800" fill="#12334A" style="letter-spacing: -1px;">calc.</text>
</svg>
