<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#EAFBFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DDF7FF;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="beadGradient" cx="35%" cy="35%" r="50%" fx="35%" fy="35%">
      <stop offset="0%" style="stop-color:#FFF7C7;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#FDE68A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CFA83A;stop-opacity:1" />
    </radialGradient>
    
    <radialGradient id="bubbleGradient" cx="35%" cy="35%" r="50%" fx="35%" fy="35%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.9" />
      <stop offset="40%" style="stop-color:#EAFBFF;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#7DD3FC;stop-opacity:0.4" />
    </radialGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="15" />
      <feOffset dx="10" dy="20" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background for app icon -->
  <rect width="1024" height="1024" rx="200" fill="url(#bgGradient)" />

  <!-- The "●●" motifs -->
  <g filter="url(#shadow)">
    <!-- Yellow Bead -->
    <circle cx="380" cy="512" r="220" fill="url(#beadGradient)" stroke="#CFA83A" stroke-width="10" />
    <circle cx="340" cy="450" r="60" fill="#FFFFFF" fill-opacity="0.4" />
    
    <!-- Bubble -->
    <circle cx="680" cy="512" r="220" fill="url(#bubbleGradient)" stroke="#7DD3FC" stroke-width="10" />
    <circle cx="640" cy="450" r="60" fill="#FFFFFF" fill-opacity="0.6" />
  </g>
</svg>
